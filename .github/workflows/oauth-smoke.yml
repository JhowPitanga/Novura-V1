name: OAuth Smoke Tests

on:
  pull_request:
    paths:
      - "supabase/functions/oauth-**"
      - "supabase/functions/_shared/adapters/oauth/**"
      - "src/WebhooksAPI/marketplace/**"
      - "src/pages/OAuthCallbackPage.tsx"
      - "src/utils/integrationHealth.ts"
      - "scripts/oauth-smoke-test.mjs"
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run test:run -- src/utils/__tests__/integrationHealth.test.ts src/utils/__tests__/oauthRedirectUris.test.ts

  smoke:
    runs-on: ubuntu-latest
    needs: unit
    if: ${{ secrets.SUPABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: node scripts/oauth-smoke-test.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
